# Portfolio zu GitHub Pages deployen (Branch-Source)
# Triggers: Push auf main ODER manuell
# Nutzt gh-pages Branch – Pages Source MUSS "Deploy from a branch" sein!

name: Deploy Portfolio (lucarue.vip)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "portfolio-pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: portfolio/package-lock.json

      - name: Install dependencies
        working-directory: portfolio
        run: npm ci

      - name: Static Export (Middleware deaktivieren)
        working-directory: portfolio
        run: |
          if [ -f middleware.ts ]; then
            mv middleware.ts middleware.ts.bak
            echo "Middleware deaktiviert"
          fi

      - name: Build static export
        working-directory: portfolio
        env:
          EXPORT_STATIC: "1"
        run: npm run build

      - name: Middleware wiederherstellen
        if: always()
        working-directory: portfolio
        run: |
          if [ -f middleware.ts.bak ]; then
            mv middleware.ts.bak middleware.ts
            echo "Middleware wiederhergestellt"
          fi

      - name: CNAME für lucarue.vip
        run: |
          if [ -f CNAME ]; then
            cp CNAME portfolio/out/CNAME
            echo "CNAME kopiert"
          fi

      - name: .nojekyll (für Next.js)
        run: touch portfolio/out/.nojekyll

      - name: Push zu gh-pages Branch
        run: |
          cd portfolio/out
          git init
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Deploy: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git branch -M gh-pages
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages:gh-pages
