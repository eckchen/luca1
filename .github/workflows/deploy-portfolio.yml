# Portfolio zu GitHub Pages deployen
# Triggers: Push auf main ODER manuell

name: Deploy Portfolio (lucarue.vip)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "portfolio-pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: portfolio/package-lock.json

      - name: Install dependencies
        working-directory: portfolio
        run: npm ci

      - name: Static Export (Middleware deaktivieren)
        working-directory: portfolio
        run: |
          if [ -f middleware.ts ]; then
            mv middleware.ts middleware.ts.bak
            echo "Middleware deaktiviert"
          fi

      - name: Build static export
        working-directory: portfolio
        env:
          EXPORT_STATIC: "1"
        run: npm run build

      - name: Middleware wiederherstellen
        if: always()
        working-directory: portfolio
        run: |
          if [ -f middleware.ts.bak ]; then
            mv middleware.ts.bak middleware.ts
            echo "Middleware wiederhergestellt"
          fi

      - name: CNAME für lucarue.vip
        run: |
          if [ -f CNAME ]; then
            cp CNAME portfolio/out/CNAME
            echo "CNAME kopiert"
          fi

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio/out

  pages:
    runs-on: ubuntu-latest
    needs: deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
