<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luca Rüggen – Portfolio</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 1.5rem;
    }
    .card {
      max-width: 420px;
      background: #141414;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; color: #fff; }
    p { margin: 0 0 1rem; color: #a3a3a3; font-size: 0.95rem; line-height: 1.5; }
    code {
      display: block;
      background: #1f1f1f;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-family: ui-monospace, monospace;
      font-size: 0.85rem;
      text-align: left;
      margin: 1rem 0;
      color: #d4d4d4;
    }
    a {
      color: #60a5fa;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Luca Rüggen – Portfolio</h1>
    <p>Die vollständige Website (Next.js + Tailwind + TypeScript) liegt im Ordner <strong>portfolio</strong>.</p>
    <p>So startest du sie:</p>
    <code>cd portfolio<br>npm install<br>npm run dev</code>
    <p>Dann öffne <a href="http://localhost:3000" target="_blank" rel="noopener">http://localhost:3000</a> im Browser.</p>
  </div>
</body>
</html>
